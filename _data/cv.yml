        highlights:
          - "First to adapt **GraNd and EL2N** gradient-based importance metrics to NLP, enabling data pruning for fine-tuned language models."
          - "Showed pruning high-scoring examples **matches or surpasses** full-dataset fine-tuning, revealing significant redundancy in NLP training sets. *(NeurIPS 2022)*"

