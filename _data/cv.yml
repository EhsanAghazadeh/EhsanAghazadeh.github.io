        highlights:
          - "First to model **multi-agent AI systems** as factor graphs with LDPC-inspired density evolution, proving a theorem predicting the asymptotic fraction of unresolved subclaims as a function of agent accuracy and network topology."
          - "Proposed the epushforward framework for ergodic trajectory design via optimal-transport conditional flow matching, proving an O(1/√K) ergodic convergence rate; enabled zero-shot deployment across multi-agent fleets."
          - "Proposed CGES, achieving **25–40% reduction in inference cost** on GSM8K, MATH, MMLU, and GPQA with no accuracy loss; proved it matches majority voting with fewer LLM calls."
          - "Showed VLM **hallucinations predominantly stem from the vision encoder and projector**, enabling targeted mitigation guidance."

      - company: University of Tehran & Tehran Institute for Advanced Studies
        position: Undergraduate Research Assistant
        location: Tehran, Iran
        start_date: 2021-01
        end_date: 2023-01
        highlights:
          - "Proposed **DecompX**, a vector-based attribution method consistently outperforming prior methods on faithfulness benchmarks. *(ACL 2023)*"
          - "First to probe PLMs for metaphorical knowledge; showed **contextual representations encode metaphor in middle layers** with cross-lingual transferability. *(ACL 2022)*"
          - "Identified **weight-mixing evaluation in edge probing produces unreliable conclusions**; showed linguistic localization varies substantially across BERT-family architectures. *(EMNLP 2021)*"

